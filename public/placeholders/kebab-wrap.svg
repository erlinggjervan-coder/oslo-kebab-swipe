      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .075"/></feComponentTransfer>
    </filter>
    <clipPath id="mouth"><ellipse cx="0" cy="-335" rx="236" ry="105"/></clipPath>
