<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-label="Illustrasjon av en kebabrull">
  <defs>
    <radialGradient id="bg" cx="68%" cy="25%" r="90%">
      <stop offset="0" stop-color="#63321f"/>
      <stop offset=".48" stop-color="#2e1c14"/>
      <stop offset="1" stop-color="#120e0b"/>
    </radialGradient>
    <linearGradient id="bread" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f2c879"/>
      <stop offset=".52" stop-color="#d99545"/>
      <stop offset="1" stop-color="#a8612f"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
